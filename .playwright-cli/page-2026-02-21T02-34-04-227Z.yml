    - listbox [ref=e71]:
      - generic [ref=e74]:
        - heading "Together with Scoolendar you will:" [level=2] [ref=e76]
        - list [ref=e77]:
          - listitem [ref=e78]:
            - generic [ref=e79]: Connect to your local homeschooling group
            - text: via the
            - link "Community Connect" [ref=e80] [cursor=pointer]:
              - /url: https://scoolendar.com/communities/map
            - text: page. Please be advised that you can see and post all the public or private events, but to see your local community events you need to be approved by your local Scoolenteers by sending them your request via the
            - link "Community Connect" [ref=e81] [cursor=pointer]:
              - /url: https://scoolendar.com/communities/map
            - text: page. Scoolenteers are trusted community members, who will ask you a few questions in order to approve your request. Once approved, you will be able to see all the events organised by your local community members.
          - listitem [ref=e82]:
            - generic [ref=e83]: Find events,
            - text: local gatherings or educational activities using a search filter for interest/subject, stage, outcome, age, location, time, day, and price via the
            - link "“Scoolendar”" [ref=e84] [cursor=pointer]:
              - /url: https://scoolendar.com/scoolendar/calendar
            - text: page. Scoolendar will assist with task management and reminders as well as with posting your own events.
          - listitem [ref=e85]:
            - generic [ref=e86]: Convert all attended events into a summary report
            - text: that can be used to keep your lovely memories, track your progress or sent as part of your application for homeschooling registration. You can generate a report based on all the activities participated by each of your children from the
            - link "My Account" [ref=e87] [cursor=pointer]:
              - /url: https://scoolendar.com/profile
            - text: page. This is the only paid feature in this not-for-profit project that will help to run the application.
          - listitem [ref=e88]:
            - generic [ref=e89]: Find useful links and resources
            - text: for your homeschooling under the
            - link "“How it works”" [ref=e90] [cursor=pointer]:
              - /url: https://scoolendar.com/help-center
          - listitem [ref=e91]:
            - generic [ref=e92]: Create your own curriculum/timetable
            - text: with all events saved in a private mode to record, track and manage your children’s learning and development progress. All events (e.g. English, Maths, Science etc.) created by you in a private mode will also go to your kids’ “summary report”.
        - paragraph [ref=e93]:
          - generic [ref=e94]: Become a Scoolenteer - a smart and cool volunteer!
          - text: Who are Scoolenteers? Scoolenteers are trusted members of their community and proactive homeschooling parents who positively influence the community; they’re the people who know and welcome most of the homeschooling families in their local area. Scoolendar needs Scoolenteers to approve membership requests to join their communities and to approve community events only visible to community members. As a gesture of appreciation, the Scoolendar team offers a report-generating feature of the app unlocked and free for all Scoolenteers who help to build the local homeschooling communities.
